name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          components: clippy

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          key: verify-${{ matrix.os }}

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-audit --locked

      - name: Audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

      - name: Clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --locked -- -D warnings -W clippy::unwrap_used

      - name: Tests
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: rtree.exe
            archive: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: rtree
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            bin: rtree
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: rtree
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          key: build-${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.bin }}" `
            -DestinationPath "rtree-${{ matrix.target }}.zip"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rtree-${{ matrix.target }}.tar.gz "${{ matrix.bin }}"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: rtree-${{ matrix.target }}
          path: |
            rtree-*.zip
            rtree-*.tar.gz

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          sha256sum rtree-*.zip rtree-*.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22

      - name: Sign checksums
        run: cosign sign-blob --yes SHA256SUMS.txt --bundle SHA256SUMS.txt.bundle

      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ESCAPED=$(echo "$VERSION" | sed 's/\./\\./g')
          BODY=$(awk "/^## \[${ESCAPED}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          echo "$BODY" > release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md \
            rtree-*.zip rtree-*.tar.gz SHA256SUMS.txt SHA256SUMS.txt.bundle
