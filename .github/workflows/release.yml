name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: verify-${{ matrix.os }}

      - name: Verify tag matches Cargo.toml version
        if: matrix.os == 'ubuntu-latest'
        run: |
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/' | tr -d '\r')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-audit@0.22.1 --locked

      - name: Audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

      - name: Install cargo-deny
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-deny@0.19.0 --locked

      - name: Deny check
        if: matrix.os == 'ubuntu-latest'
        run: cargo deny check

      - name: Clippy lib+bins
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --locked --lib --bins -- -D warnings -W clippy::unwrap_used

      - name: Clippy tests+bench
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --locked --tests --benches -- -D warnings

      - name: Tests
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: rtree.exe
            archive: zip
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            bin: rtree
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            bin: rtree
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: rtree
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: build-${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $staging = "rtree-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$staging/"
          Copy-Item @("README.md", "README.en.md", "LICENSE", "CHANGELOG.md") "$staging/"
          Compress-Archive -Path "$staging" -DestinationPath "rtree-$version-${{ matrix.target }}.zip"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          version="${GITHUB_REF_NAME#v}"
          staging="rtree-$version-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$staging/"
          cp README.md README.en.md LICENSE CHANGELOG.md "$staging/"
          tar czf "rtree-$version-${{ matrix.target }}.tar.gz" "$staging"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: rtree-${{ matrix.target }}
          path: |
            rtree-*.zip
            rtree-*.tar.gz

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          sha256sum rtree-*.zip rtree-*.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Sign checksums
        run: cosign sign-blob --yes SHA256SUMS.txt --bundle SHA256SUMS.txt.bundle

      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ESCAPED=$(echo "$VERSION" | sed 's/\./\\./g')
          BODY=$(awk "/^## \[${ESCAPED}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          echo "$BODY" > release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md \
            rtree-*.zip rtree-*.tar.gz SHA256SUMS.txt SHA256SUMS.txt.bundle
